<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        Password:<br>
        <input type="password" name="password" id="pass" onclick="span()" oninput="input()"><span id="sidetext"></span>
        <i class="fa-solid fa-arrows-spin fa-spin" id="i" style="opacity: 0;"></i><i class="fa-solid fa-check" style="opacity: 0;" id="tik"></i>
    </form>
    <script>
           function span(){
            var a = document.getElementById("sidetext");
            a.innerHTML ="enter your 10 digit password";
            a.style.fontStyle ="bold";
            a.style.color ="red";
            a.style.marginLeft ="5px";
            
            
           }
            
            
        function input(){
            var sidetext = document.getElementById("sidetext");
            sidetext.style.display = "none";
            var b = document.getElementById("i");
            b.style.opacity = "1";

            var len = document.getElementById("pass").value;
            var check = document.getElementById("tik");

            var length_of =len.length;
            length_of >=10 ? b.style.opacity=0 : check.style.opacity=1
            length_of <9 ? check.style.opacity= 0 :b.style.opacity=1

            
            
            
        }

           
    </script>
</body>
</html>
