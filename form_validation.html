<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form onsubmit=" return form()">
        Username<br>
        <input type="text" name="" id="user"><br><br>
        Password<br>
        <input type="password" name="" id="pass"><br><br>
        <input type="submit" value="login">
    </form><br>
    <p id="para"></p>
    <script>
        function form(){
            var user = document.getElementById("user").value;
            var pass =document.getElementById("pass").value;
            var result = user =="rahman" && pass == "52344" ? "login successful" : "wrong username or password";
            document.getElementById("para").innerHTML=result;
            return false;

        }
    </script>
</body>
</html>
